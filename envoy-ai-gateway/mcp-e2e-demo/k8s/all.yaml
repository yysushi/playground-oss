# MCP Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
spec:
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
      - name: mcp
        image: mcp:local
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector:
    app: mcp
  ports:
  - port: 80
    targetPort: 8080
---
# OAuth Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth
spec:
  selector:
    matchLabels:
      app: oauth
  template:
    metadata:
      labels:
        app: oauth
    spec:
      containers:
      - name: oauth
        image: oauth:local
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: oauth
spec:
  selector:
    app: oauth
  ports:
  - port: 80
    targetPort: 8080
---
# Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
spec:
  gatewayClassName: eg
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
---
# Backend
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: mcp-backend
spec:
  endpoints:
  - fqdn:
      hostname: mcp.default.svc.cluster.local
      port: 80
---
# MCP Route with OAuth
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: MCPRoute
metadata:
  name: mcp-route
spec:
  parentRefs:
  - name: mcp-gateway
    kind: Gateway
    group: gateway.networking.k8s.io
  path: "/mcp"
  backendRefs:
  - name: mcp-backend
    kind: Backend
    group: gateway.envoyproxy.io
    path: "/mcp"
  securityPolicy:
    oauth:
      issuer: "http://oauth.default.svc.cluster.local/oidc"
      audiences:
      - "http://mcp-gateway.local/mcp"
      protectedResourceMetadata:
        resource: "http://mcp-gateway.local/mcp"
        scopesSupported:
        - "openid"
