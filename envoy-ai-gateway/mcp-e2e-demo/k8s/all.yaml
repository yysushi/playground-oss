# MCP Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
spec:
  selector:
    matchLabels:
      app: mcp
  template:
    metadata:
      labels:
        app: mcp
    spec:
      containers:
      - name: mcp
        image: mcp:local
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: mcp
spec:
  selector:
    app: mcp
  ports:
  - port: 80
    targetPort: 8080
---
# OAuth Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth
spec:
  selector:
    matchLabels:
      app: oauth
  template:
    metadata:
      labels:
        app: oauth
    spec:
      containers:
      - name: oauth
        image: oauth:local
        imagePullPolicy: Never
        command: ["/oauth"]
        args:
          - "-domain"
          - "oauth.default.svc.cluster.local"
          - "-port"
          - "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: oauth
spec:
  selector:
    app: oauth
  ports:
  - port: 8080
    targetPort: 8080
---
---
# GatewayClass + Gateway + EnvoyProxy (official example pattern)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aigw-run
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: aigw-run
spec:
  gatewayClassName: aigw-run
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-ai-gateway
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-ai-gateway
spec:
  logging:
    level:
      default: error
---
# Backend for MCP Server
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: mcp-backend
spec:
  endpoints:
  - fqdn:
      hostname: mcp.default.svc.cluster.local
      port: 80
