---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mockoidc
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mockoidc
  template:
    metadata:
      labels:
        app: mockoidc
    spec:
      containers:
      - name: mockoidc
        image: mockoidc:latest
        imagePullPolicy: Never
        args:
          - "-domain"
          - "mockoidc.default.svc.cluster.local:8888"
          - "-port"
          - "8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mockoidc
  namespace: default
spec:
  selector:
    app: mockoidc
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: http-alt
    port: 8888
    targetPort: 8080
